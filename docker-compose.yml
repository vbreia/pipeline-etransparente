version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW_HOME=/home/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/home/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=false
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/google/wif-credential.json
      - GA4_PROPERTY_ID=414902979
      - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
      - AIRFLOW__SMTP__SMTP_PORT=587
      - AIRFLOW__SMTP__SMTP_STARTTLS=True
      - AIRFLOW__SMTP__SMTP_SSL=False
      - AIRFLOW__SMTP__SMTP_USER=transparencia@direitocoletivo.org.br
      - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=transparencia@direitocoletivo.org.br
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - PIPELINE_TEST_MODE=false
      - SEND_REPORTS_ENABLED=false
      - SEND_REPORTS_TEST_MODE=false
      - SEND_REPORTS_TEST_EMAIL=comunicacao@direitocoletivo.org.br
    command: airflow scheduler
    volumes:
      - airflow_home:/home/airflow
      - ./dags:/home/airflow/dags
      - ./scripts:/home/airflow/scripts
      - ./assets:/home/airflow/assets
      - ./output:/home/airflow/output
      - ./logs:/home/airflow/logs
      - /etc/google:/etc/google:ro
    restart: always

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW_HOME=/home/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/home/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=false
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/google/wif-credential.json
      - GA4_PROPERTY_ID=414902979
      - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
      - AIRFLOW__SMTP__SMTP_PORT=587
      - AIRFLOW__SMTP__SMTP_STARTTLS=True
      - AIRFLOW__SMTP__SMTP_SSL=False
      - AIRFLOW__SMTP__SMTP_USER=transparencia@direitocoletivo.org.br
      - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=transparencia@direitocoletivo.org.br
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - PIPELINE_TEST_MODE=false
      - SEND_REPORTS_ENABLED=false
      - SEND_REPORTS_TEST_MODE=false
      - SEND_REPORTS_TEST_EMAIL=comunicacao@direitocoletivo.org.br
    command: airflow webserver -p 8080
    volumes:
      - airflow_home:/home/airflow
      - ./dags:/home/airflow/dags
      - ./scripts:/home/airflow/scripts
      - ./assets:/home/airflow/assets
      - ./output:/home/airflow/output
      - ./logs:/home/airflow/logs
      - /etc/google:/etc/google:ro
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:
  airflow_home:

networks:
  default:
    name: airflow-network
