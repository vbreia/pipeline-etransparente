<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Mensal de Transparência</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 10px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:6px;overflow:hidden;">

          <!-- Banner sólido substituindo {{url_banner}} -->
          <tr>
            <td style="background-color:#1a3a5c;padding:30px 40px;text-align:center;">
              <h1 style="color:#ffffff;font-size:22px;margin:0;font-weight:700;letter-spacing:1px;">RELATÓRIO MENSAL DE TRANSPARÊNCIA</h1>
            </td>
          </tr>

          <!-- Saudação -->
          <tr>
            <td style="padding:30px 40px 10px 40px;">
              <p style="font-size:16px;color:#333333;margin:0 0 6px 0;">Prezados(as) <strong>{{nome_ong}}</strong>,</p>
            </td>
          </tr>

          <!-- Parágrafos dinâmicos -->
          <tr>
            <td style="padding:10px 40px;">
              <p style="font-size:15px;color:#444444;line-height:1.6;margin:0 0 16px 0;">{{paragrafo_1}}</p>
              <p style="font-size:15px;color:#444444;line-height:1.6;margin:0 0 16px 0;">{{paragrafo_2}}</p>
              <p style="font-size:15px;color:#444444;line-height:1.6;margin:0 0 16px 0;">{{paragrafo_3}}</p>
              <p style="font-size:15px;color:#444444;line-height:1.6;margin:0 0 16px 0;">{{paragrafo_4}}</p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:10px 40px 30px 40px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="background-color:#1a3a5c;border-radius:4px;">
                    <a href="{{url_ong}}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:15px;color:#ffffff;text-decoration:none;font-weight:600;">Acesse sua página no etransparente.org</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Rodapé -->
          <tr>
            <td style="background-color:#f8f8f8;padding:20px 40px;text-align:center;border-top:1px solid #e0e0e0;">
              <p style="font-size:12px;color:#888888;margin:0 0 4px 0;">
                Instituto de Direito Coletivo &mdash; transparencia@direitocoletivo.org.br
              </p>
              <p style="font-size:12px;color:#888888;margin:0;">
                {{descadastro}}
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
