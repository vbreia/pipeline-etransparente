<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>etransparente.org — OSCs</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;display:flex}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#0f172a;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo .logo-text{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px}
.sidebar-logo .logo-sub{color:#94a3b8;font-size:12px;margin-top:2px}
.sidebar-nav{padding:12px 0;flex:1}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#94a3b8;text-decoration:none;font-size:14px;transition:all .15s}
.sidebar-nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
.sidebar-nav a.active{color:#fff;background:rgba(59,130,246,.15);border-right:3px solid #3b82f6;font-weight:500}
.sidebar-nav a i{font-size:18px;width:20px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-footer .user-email{color:#94a3b8;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-footer a{display:flex;align-items:center;gap:8px;color:#94a3b8;text-decoration:none;font-size:12px;margin-top:6px;transition:color .15s}
.sidebar-footer a:hover{color:#fca5a5}
.content{margin-left:220px;flex:1;padding:32px;max-width:1400px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:24px;font-weight:700;color:#0f172a}
.page-header .date{font-size:14px;color:#64748b}
.search-filter-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-filter-row .search-bar{position:relative;flex:1;min-width:200px;max-width:400px}
.search-filter-row .search-bar input{width:100%;padding:9px 14px 9px 36px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:#fff}
.search-filter-row .search-bar input:focus{border-color:#1e3a8a;box-shadow:0 0 0 3px rgba(30,58,138,.1)}
.search-filter-row .search-bar i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.filter-pill{padding:6px 16px;border:1px solid #e2e8f0;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;color:#64748b;transition:all .15s;font-weight:500}
.filter-pill:hover{background:#f1f5f9}
.filter-pill.active{background:#1e3a8a;color:#fff;border-color:#1e3a8a}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.osc-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;text-align:center;transition:box-shadow .2s}
.osc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.osc-card .osc-logo{width:72px;height:72px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#64748b;margin-bottom:12px;overflow:hidden;flex-shrink:0}
.osc-card .osc-logo img{width:100%;height:100%;object-fit:cover}
.osc-card .osc-name{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.3}
.osc-card .osc-score{font-size:12px;color:#64748b;margin-bottom:10px}
.osc-card .osc-score strong{color:#1e3a8a}
.osc-card .osc-link{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:#1e3a8a;color:#fff;border-radius:6px;font-size:12px;font-weight:500;text-decoration:none;transition:background .15s;margin-top:auto}
.osc-card .osc-link:hover{background:#1e40af}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:600;text-transform:uppercase}
.pill-otimo{background:#dcfce7;color:#16a34a}
.pill-bom{background:#fef9c3;color:#d97706}
.pill-regular{background:#fee2e2;color:#dc2626}
.spinner-overlay{position:fixed;inset:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#1e3a8a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-msg{padding:48px;text-align:center;color:#94a3b8;font-size:14px}
.hidden{display:none!important}
@media(max-width:768px){.sidebar{width:56px}.sidebar-logo .logo-text,.sidebar-logo .logo-sub,.sidebar-nav a span,.sidebar-footer .user-email,.sidebar-footer a span{display:none}.sidebar-nav a{padding:12px;justify-content:center}.sidebar-footer{padding:12px;display:flex;flex-direction:column;align-items:center}.sidebar-footer a{justify-content:center}.content{margin-left:56px;padding:20px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}}
@media(max-width:480px){.content{padding:16px}.card-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="spinner" class="spinner-overlay"><div class="spinner"></div><div style="font-size:13px;color:#64748b">Carregando OSCs...</div></div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">etransparente.org</div>
    <div class="logo-sub">Dashboard IDC</div>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html"><i class="ph ph-chart-bar"></i><span>Visão Geral</span></a>
    <a href="oscs.html" class="active"><i class="ph ph-buildings"></i><span>OSCs</span></a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-email" id="userEmail">Carregando...</div>
    <a href="/.auth/logout"><i class="ph ph-sign-out"></i><span>Sair</span></a>
  </div>
</aside>

<main class="content" id="app" style="opacity:0;transition:opacity .3s">
  <div class="page-header">
    <h1>OSCs</h1>
    <span class="date" id="dataAtual"></span>
  </div>

  <div class="search-filter-row">
    <div class="search-bar"><i class="ph ph-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Buscar OSC..." oninput="renderGrid()"></div>
    <div class="filter-pills" id="filterPills">
      <button class="filter-pill active" data-filter="all" onclick="setFilter('all')">Todos</button>
      <button class="filter-pill" data-filter="otimo" onclick="setFilter('otimo')">Otimo</button>
      <button class="filter-pill" data-filter="bom" onclick="setFilter('bom')">Bom</button>
      <button class="filter-pill" data-filter="regular" onclick="setFilter('regular')">Regular</button>
    </div>
  </div>

  <div id="oscGrid" class="card-grid"></div>
</main>

<script>
const SAS_HISTORICO = 'https://etransparentedata.blob.core.windows.net/etransparente/gold/oscs_historico.json?sp=r&st=2026-06-24T17:39:25Z&se=2028-06-24T01:54:25Z&spr=https&sv=2026-02-06&sr=b&sig=iqgg1FYsnDoDHWg9jYBNWTWDA2AIY8OpDCjYi9%2FskcA%3D';
const SAS_OSCS_ATUAL = 'https://etransparentedata.blob.core.windows.net/etransparente/gold/oscs_atual.json?sp=r&st=2026-06-24T20:07:43Z&se=2028-06-25T04:22:43Z&spr=https&sv=2026-02-06&sr=b&sig=4msqyyq7mKOZYyeMM84L7ND3JSoHKeRoChU2BTRr%2FOU%3D';

let historico = [];
let bronzeData = [];
let filtroClassif = 'all';

fetch('/.auth/me').then(r=>r.json()).then(d=>{
  document.getElementById('userEmail').textContent = d.clientPrincipal?.userDetails || d.clientPrincipal?.userId || 'Usuario';
}).catch(()=>{});

(function(){
  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const d=new Date();
  document.getElementById('dataAtual').textContent = d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
})();

async function loadData() {
  try {
    const histRes = await fetch(SAS_HISTORICO);
    historico = await histRes.json();
    if(SAS_OSCS_ATUAL) {
      try {
        const bronzeRes = await fetch(SAS_OSCS_ATUAL);
        bronzeData = bronzeRes.ok ? await bronzeRes.json() : [];
      } catch(e) {}
    }
    render();
  } catch(e) {
    document.getElementById('spinner').innerHTML = '<div style="color:#dc2626">Erro ao carregar dados.</div>';
  }
}

const calcPct = item => item.max_nota>0?(item.nota_final/item.max_nota*100):0;

function getCiclos() { return [...new Set(historico.map(h=>h.ciclo))].sort(); }
function getUltimoCiclo() { const c=getCiclos(); return c.length?c[c.length-1]:null; }
function getDadosCiclo(ciclo) { const m={}; historico.filter(h=>h.ciclo===ciclo).forEach(h=>{m[h.nome]=h}); return Object.values(m); }

function classPill(classe) {
  if(!classe) return 'pill-regular';
  const c=classe.toLowerCase().replace('ó','o');
  return c==='otimo'?'pill-otimo':c==='bom'?'pill-bom':'pill-regular';
}

function getLogoUrl(nome) {
  const o=bronzeData.find(x=>x.nome===nome);
  return o?.logo_url||'';
}

function setFilter(f) {
  filtroClassif=f;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
  renderGrid();
}

function render() {
  renderGrid();
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('app').style.opacity='1';
}

function renderGrid() {
  const ciclo=getUltimoCiclo();
  if(!ciclo) {document.getElementById('oscGrid').innerHTML='<div class="empty-msg">Nenhum dado disponivel</div>';return;}
  let dados=getDadosCiclo(ciclo);

  const q=(document.getElementById('searchInput').value||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(q) dados=dados.filter(d=>d.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q));

  if(filtroClassif!=='all') {
    dados=dados.filter(d=>{
      const c=(d.classificacao||'regular').toLowerCase().replace('ó','o');
      return c===filtroClassif;
    });
  }

  dados.sort((a,b)=>b.nota_final-a.nota_final);

  const el=document.getElementById('oscGrid');
  if(!dados.length) {el.innerHTML='<div class="empty-msg">Nenhuma OSC encontrada</div>';return;}

  el.innerHTML=dados.map(d=>{
    const logo=getLogoUrl(d.nome);
    const pct=calcPct(d);
    return `
    <div class="osc-card">
      <div class="osc-logo">${logo?'<img src="'+logo+'" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" style="width:100%;height:100%;object-fit:cover;border-radius:50%"><div style="display:none;width:72px;height:72px;border-radius:50%;background:#e2e8f0;color:#64748b;align-items:center;justify-content:center;font-size:28px;font-weight:700">'+d.nome.charAt(0)+'</div>':d.nome.charAt(0)}</div>
      <div class="osc-name">${d.nome}</div>
      <div class="osc-score"><strong>${d.nota_final.toFixed(1)}</strong>/${d.max_nota} · ${pct.toFixed(1)}%</div>
      <span class="pill ${classPill(d.classificacao)}" style="margin-bottom:12px">${d.classificacao||'Regular'}</span>
      <a class="osc-link" href="osc.html?nome=${encodeURIComponent(d.nome)}"><i class="ph ph-arrow-square-out"></i> Ver perfil</a>
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
